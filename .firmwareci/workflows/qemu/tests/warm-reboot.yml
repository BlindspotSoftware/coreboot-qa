name: Warm Reboot Test
description: Flash the provided firmware binary and do multiple warm reboots.

stages:
  - name: Reboot 1
    steps:
      - cmd: qemu
        name: Warm reboot DUT
        options:
          timeout: 5m
        parameters:
          mode: run
          variable: qemu_pid
          serial:
            - send: "reboot"
            - expect:
                regex: "Welcome to NixOS"
              timeout: 2m0s

